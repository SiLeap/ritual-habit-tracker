<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ritual — Habit Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="logo">Ritual</h1>
      <button class="btn-add" id="btnAdd">
        <span class="btn-icon">+</span>
        Add Habit
      </button>
    </header>

    <main class="main">
      <div class="habits-container" id="habitsContainer">
        <!-- Habits will be rendered here -->
      </div>

      <div class="empty-state" id="emptyState">
        <div class="empty-illustration">
          <svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="60" cy="60" r="50" fill="#FEF3C7"/>
            <path d="M40 55C40 50 45 45 50 45H70C75 45 80 50 80 55V65C80 70 75 75 70 75H50C45 75 40 70 40 65V55Z" fill="#F59E0B" fill-opacity="0.3"/>
            <circle cx="50" cy="55" r="3" fill="#F59E0B"/>
            <circle cx="60" cy="52" r="3" fill="#F59E0B"/>
            <circle cx="70" cy="55" r="3" fill="#F59E0B"/>
            <path d="M50 63C50 60 55 58 60 58C65 58 70 60 70 63" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
            <path d="M35 40L45 50M85 40L75 50M60 35L60 42" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
          </svg>
        </div>
        <h2 class="empty-title">Start Your Journey</h2>
        <p class="empty-text">Add your first habit and begin building meaningful daily rituals.</p>
        <button class="btn-add btn-add-empty" id="btnAddEmpty">
          <span class="btn-icon">+</span>
          Add Your First Habit
        </button>
      </div>
    </main>

    <div class="toast-container" id="toastContainer"></div>
  </div>

  <!-- Add Habit Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">Add New Habit</h2>
        <button class="modal-close" id="modalClose">×</button>
      </div>
      <form class="modal-form" id="habitForm">
        <div class="form-group">
          <label class="form-label" for="habitName">Habit Name</label>
          <input type="text" class="form-input" id="habitName" placeholder="e.g., Read 30 min" required maxlength="50">
        </div>

        <div class="form-group">
          <label class="form-label">Choose an Icon</label>
          <div class="icon-picker" id="iconPicker">
            <button type="button" class="icon-option" data-icon="📖">📖</button>
            <button type="button" class="icon-option" data-icon="🏃">🏃</button>
            <button type="button" class="icon-option" data-icon="🧘">🧘</button>
            <button type="button" class="icon-option" data-icon="💪">💪</button>
            <button type="button" class="icon-option" data-icon="✍️">✍️</button>
            <button type="button" class="icon-option" data-icon="🎨">🎨</button>
            <button type="button" class="icon-option" data-icon="🎵">🎵</button>
            <button type="button" class="icon-option" data-icon="🌱">🌱</button>
            <button type="button" class="icon-option" data-icon="💤">💤</button>
            <button type="button" class="icon-option" data-icon="💧">💧</button>
            <button type="button" class="icon-option" data-icon="🍎">🍎</button>
            <button type="button" class="icon-option" data-icon="🧠">🧠</button>
          </div>
          <input type="hidden" id="habitIcon" value="📖">
        </div>

        <div class="form-group">
          <label class="form-label" for="habitCategory">Category</label>
          <select class="form-select" id="habitCategory" required>
            <option value="learning">Learning</option>
            <option value="fitness">Fitness</option>
            <option value="mindfulness">Mindfulness</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="habitDays">Target Days</label>
          <input type="number" class="form-input" id="habitDays" placeholder="21" min="1" max="365" value="21" required>
          <span class="form-hint">How many days to build this habit?</span>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="btnCancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Habit</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
